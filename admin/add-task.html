<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Add New Task</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <a href="admin-dashboard.html"><i class="fas fa-arrow-left"></i> Back To Dashboard</a>
        <br /><br />
        <h1>Create New Task</h1>
        <p>Assign a new task to a teacher with priority and details.</p>
    </header>

    <hr />

    <form action="admin-tasks.html">
        <fieldset>
            <legend>1. Basic Information</legend>

            <label for="taskId"><i class="fas fa-hashtag"></i> Task ID:</label>
            <input type="text" id="taskId" name="taskId" placeholder="Ex: TASK-101" pattern="TASK-[0-9]+" required />

            <br /><br />

            <label for="priority"><i class="fas fa-flag"></i> Priority Level:</label>
            <select id="priority" name="taskPriority" required>
                <option value="">-- Choose Priority --</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </fieldset>

        <br />

        <fieldset>
            <legend>2. Task Details</legend>

            <label for="title"><i class="fas fa-font"></i> Task Title:</label>
            <input type="text" id="title" name="taskTitle" placeholder="Enter a clear title" required />

            <br /><br />

            <label for="deadline"><i class="fas fa-calendar-days"></i> Due Date:</label>
            <input type="date" id="deadline" name="deadlineDate" required />

            <br /><br />

            <label for="teacher"><i class="fas fa-user"></i> Teacher Name:</label>
            <input type="text" id="teacher" name="teacherName" placeholder="Enter teacher's name" required />

            <br /><br />

            <label for="desc"><i class="fas fa-file-lines"></i> Detailed Description:</label> <br />
            <textarea id="desc" name="taskDescription" rows="4" cols="40" placeholder="Write instructions here" required></textarea>
        </fieldset>

        <br />
        <button type="reset"><i class="fas fa-times"></i> Cancel</button>
        <button type="submit"><i class="fas fa-plus"></i> Create Task</button>
    </form>

    <hr />
</body>
</html>
