<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Task</title>
    <link rel="stylesheet" href="../css/add-and-edit-Task.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
  </head>

  <body>
    <div id="navbar-placeholder"></div>
    <main class="mainContainer">
      <a href="admin-tasks.html" class="backLink">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>

      <h1 class="pageTitle">Edit Task</h1>

      <form action="admin-tasks.html" class="taskForm">
        <fieldset class="formSection">
          <legend>1. Basic Information</legend>

          <div class="inputGroup">
            <label for="taskId">Task ID</label>
            <input
              type="text"
              id="taskId"
              name="taskId"
              placeholder="e.g., TSK-001"
              pattern="TASK-[0-9]+"
              readonly
              title="Task ID cannot be changed during edit"
            />
          </div>

          <div class="inputGroup">
            <label for="createdBy">Created By</label>
            <input
              type="text"
              id="createdBy"
              name="createdBy"
              placeholder="Admin name"
              pattern="[A-Za-z\s]+"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="priority">Priority</label>
            <select id="priority" name="taskPriority" required>
              <option value="high">High</option>

              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </fieldset>

        <fieldset class="formSection">
          <legend>2. Task Details</legend>

          <div class="inputGroup">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="taskTitle"
              placeholder="Task title"
              minlength="5"
              maxlength="100"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="subject">Subject</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="e.g., Mathematics, English"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="deadline">Due Date</label>
            <input type="date" id="deadline" name="deadlineDate" required />
          </div>

          <div class="inputGroup">
            <label for="teacher">Teacher Name</label>
            <input
              type="text"
              id="teacher"
              name="teacherName"
              placeholder="Assigned teacher"
              pattern="[A-Za-z\s]+"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="desc">Description</label>
            <textarea
              id="desc"
              name="taskDescription"
              rows="5"
              placeholder="Detailed task description..."
              minlength="10"
              required
            ></textarea>
          </div>
        </fieldset>

        <div class="buttonGroup">
          <button
            type="button"
            class="btnCancel"
            onclick="window.history.back()"
          >
            Cancel
          </button>
          <button type="submit" class="btnSubmit">Update Task</button>
        </div>
      </form>
    </main>

    <script src="../js/index.js"></script>

    <script src="../js/navbar.js"></script>
    <script src="../js/add-edit-Task.js"></script>
  </body>
</html>
