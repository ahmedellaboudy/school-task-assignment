{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add New Task</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'css/add-and-edit-Task.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <main class="mainContainer">
      <a href="{% url 'admin_tasks' %}" class="backLink">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>

      <h1 class="pageTitle">Add New Task</h1>

      <form method="POST" action="{% url 'add_task' %}" class="taskForm">
        {% csrf_token %}
        <fieldset class="formSection">
          <legend>1. Basic Information</legend>

          <div class="inputGroup">
            <label for="taskId">Task ID</label>
            <input
              type="text"
              id="taskId"
              name="taskId"
              value="{{ next_task_id }}"
              readonly
              style="background-color: #f3f4f6; color: #64748b; cursor: not-allowed;"
            />
          </div>

          <div class="inputGroup">
            <label for="createdBy">Created By</label>
            <input
              type="text"
              id="createdBy"
              name="createdBy"
              value="{{ request.user.username }}"
              readonly
            />
          </div>

          <div class="inputGroup">
            <label for="priority">Priority</label>
            <select id="priority" name="taskPriority" required>
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </fieldset>

        <fieldset class="formSection">
          <legend>2. Task Details</legend>

          <div class="inputGroup">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="taskTitle"
              placeholder="Task title"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="subject">Subject</label>
            <input
              type="text"
              id="subject"
              name="subject"
              placeholder="e.g., Mathematics, English"
              required
            />
          </div>

          <div class="inputGroup">
            <label for="deadline">Due Date</label>
            <input type="date" id="deadline" name="deadlineDate" required />
          </div>

          <div class="inputGroup">
            <label for="teacher">Teacher Name</label>
            <select id="teacher" name="teacherName" required>
              <option value="">-- Select Teacher --</option>
              {% for teacher in teachers %}
                <option value="{{ teacher.id }}">{{ teacher.username }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="inputGroup">
            <label for="desc">Description</label>
            <textarea
              id="desc"
              name="taskDescription"
              rows="5"
              placeholder="Detailed task description..."
              required
            ></textarea>
          </div>
        </fieldset>

        <div class="buttonGroup">
          <button type="button" class="btnCancel" onclick="window.history.back()">
            Cancel
          </button>
          <button type="submit" class="btnSubmit">Create Task</button>
        </div>
      </form>
    </main>

    <script src="{% static 'js/navbar.js' %}"></script>
    <script src="{% static 'js/add-edit-Task.js' %}"></script>
  </body>
</html>
