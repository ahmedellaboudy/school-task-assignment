<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <style></style>
  </head>
  <body>
    <header>
      <nav>
        <div>
          <h3>SchoolTask</h3>
        </div>
        <div>
          <a href="#">My Tasks</a>
          <a href="./completed-tasks.html"><h4>Completed</h4></a>

          <div>
            <div>
              <h4>Teacher Name</h4>
              <p>Teacher</p>
            </div>
            <a href="../login.html">Log Out</a>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div>
        <div>
          <h2>My Assigned Tasks</h2>
          <p>View and manage tasks assigned to you.</p>
        </div>
        <div>
          <select name="" id="">
            <option value="all">All Priorities</option>
            <option value="pending">High</option>
            <option value="completed">Medium</option>
            <option value="overdue">Low</option>
          </select>
        </div>
      </div>

      <div>
        <div>
          <div>
            <h4>ID : id</h4>
          </div>
          <div>
            <h4>Medium Priority</h4>
          </div>
        </div>
        <div>
          <h3>Task Name</h3>
          <p>Task Description</p>
        </div>
        <div>
          <hr />
          <h4>From : Admin</h4>
        </div>
        <div>
          <a href="./task-details.html"><button>View Details</button></a>
          <button>Mark Complete</button>
        </div>
      </div>
    </main>
  </body>
</html>
