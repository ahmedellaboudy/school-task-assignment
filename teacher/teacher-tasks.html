<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Tasks | SchoolTask</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/teacher-tasks.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body>
    <main class="mainContainer dashboardContainer">
      <header class="dashboardHeader teacherHeader">
        <div class="headerText">
          <h1 class="pageTitle">My Assigned Tasks</h1>
          <p class="subtitle">View and manage tasks assigned to you.</p>
        </div>

        <div class="filterGroup">
          <select
            name="priority-filter"
            id="priority-filter"
            class="filterSelect"
          >
            <option value="all">All Priorities</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </header>

      <section class="tableContainer">
        <table class="tasksTable">
          <thead>
            <tr>
              <th class="centered">ID</th>
              <th>Title</th>
              <th>Task Details</th>
              <th>From</th>
              <th class="centered">Priority</th>
              <th class="centered">Status</th>
              <th class="centered">Actions</th>
            </tr>
          </thead>

          <tbody id="teacherTasksBody"></tbody>
        </table>
      </section>
    </main>
    <script src="../js/index.js"></script>

    <script src="../js/navbar.js"></script>
    <script src="../js/teacher-tasks.js"></script>
  </body>
</html>
