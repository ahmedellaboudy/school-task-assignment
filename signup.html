<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./css/signup.css">
    <link rel="stylesheet" href="./css/global.css">
</head>
<body>


    <main class="main">
        <div class="card">
            <div class="card-icon">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>

            <h2 class="welcome">Create Your Account</h2>
            <p class="card-text">Join us as an Admin or Teacher to manage tasks.</p>

            <form class="form" novalidate>

                
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
                <small class="error-message" id="usernameError"></small>

                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@gmail.com" required>
                <small class="error-message" id="emailError"></small>

                

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create password" required>
                <small class="error-message" id="passwordError"></small>



                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required>
                <small class="error-message" id="confirmPasswordError"></small>

                
                <label class="role-label">Role</label>

                <div class="roles">
                    <input type="radio" id="teacher" name="role" value="teacher">
                    <label for="teacher" class="role-btn">Teacher</label>

                    <input type="radio" id="admin" name="role" value="admin">
                    <label for="admin" class="role-btn">Admin</label>
                </div>

                <small class="error-message" id="roleError"></small>

                <button type="submit" class="signup-btn">Create Account</button>
                <p id="successMessage"></p>
            </form>

            <p class="bottom-text">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </main>

<script src="js/signup.js"></script>
<script src="JS/navbar.js"></script>

</body>
</html>
