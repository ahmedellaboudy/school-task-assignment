    <h1>Create Your Account</h1>
    <p>Join as an Admin or Teacher to manage tasks.</p>

    <form>
        
        <label for="username">Username</label><br>
        <input type="text" id="username" name="username" placeholder="Choose a username" required><br><br>

        
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="name@gmail.com" required><br><br>

        
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="Create password" required><br><br>

        
        <label for="confirm-password">Confirm Password</label><br>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat password" required><br><br>

        
        <label>Select Role</label><br>
        <input type="radio" id="teacher" name="role" value="teacher" required>
        <label for="teacher">Teacher</label><br>
        <input type="radio" id="admin" name="role" value="admin" required>
        <label for="admin">Admin</label><br><br>

        
        <button type="submit">Create Account</button>
    </form>

</body>
</html>
