    <h1>Manage school tasks with clarity and precision</h1>
    <p>A simple platform for teachers and admins to manage school tasks efficiently</p>

    
    <form>
       
        <label for="username">Username</label><br>
        <input type="text" id="username" name="username" placeholder="Enter username" required><br><br>

        
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

        
        <label>Select Role</label><br>
        <input type="radio" id="teacher" name="role" value="teacher" required>
        <label for="teacher">Teacher</label><br>
        <input type="radio" id="admin" name="role" value="admin" required>
        <label for="admin">Admin</label><br><br>

        
        <button type="submit">Login</button>
    </form>
